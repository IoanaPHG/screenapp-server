<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenApp</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --text: #1f1a14;
      --muted: #6d6257;
      --line: #d8cfc3;
      --accent: #c96c3a;
      --accent-dark: #9f4b1f;
      --success: #2f855a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #f8d8bf 0, transparent 28%),
        linear-gradient(135deg, #efe3d3, var(--bg));
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
    }

    .layout {
      display: grid;
      gap: 20px;
      grid-template-columns: 320px 1fr;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(60, 38, 18, 0.08);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      background: #fff;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 13px 16px;
      font: inherit;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    }

    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary {
      margin-top: 10px;
      color: var(--text);
      background: #efe3d3;
    }

    .status {
      margin: 14px 0 0;
      color: var(--success);
      min-height: 22px;
      font-size: 14px;
    }

    .videoWrap {
      overflow: hidden;
      min-height: 420px;
    }

    video {
      display: block;
      width: 100%;
      min-height: 420px;
      background: #111;
      border-radius: 14px;
    }

    .logs {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #f7f1e8;
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      min-height: 120px;
    }

    .hint {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      video {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>ScreenApp</h1>
    <p class="subtitle">Ion partajeaza ecranul. Maria intra si vede stream-ul in browser.</p>

    <section class="layout">
      <div class="panel">
        <label for="username">Username</label>
        <input id="username" value="Ion" />

        <label for="targetUser">Target user</label>
        <input id="targetUser" value="Maria" />

        <button id="connectButton">Connect</button>
        <button id="shareButton" class="secondary" disabled>Share Screen</button>

        <p id="status" class="status">Neconectat</p>
        <p class="hint">Pentru test: intr-un tab foloseste `Ion -> Maria`, iar in al doilea `Maria -> Ion`.</p>
      </div>

      <div class="panel videoWrap">
        <video id="screenVideo" autoplay playsinline muted></video>
        <div id="logs" class="logs">Jurnal aplicatie</div>
      </div>
    </section>
  </main>

  <script>
    const usernameInput = document.getElementById("username");
    const targetUserInput = document.getElementById("targetUser");
    const connectButton = document.getElementById("connectButton");
    const shareButton = document.getElementById("shareButton");
    const statusText = document.getElementById("status");
    const screenVideo = document.getElementById("screenVideo");
    const logs = document.getElementById("logs");

    let ws = null;
    let pc = null;
    let localStream = null;
    let username = "";
    let targetUser = "";

    connectButton.addEventListener("click", connect);
    shareButton.addEventListener("click", shareScreen);

    function connect() {
      username = usernameInput.value.trim();
      targetUser = targetUserInput.value.trim();

      if (!username || !targetUser) {
        setStatus("Completeaza username si target user.");
        return;
      }

      if (ws && ws.readyState === WebSocket.OPEN) {
        logLine("WebSocket deja conectat.");
        return;
      }

      const protocol = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${protocol}://${location.host}`);
      pc = createPeerConnection();

      ws.addEventListener("open", () => {
        setStatus(`Conectat ca ${username}`);
        shareButton.disabled = username !== "Ion";
        logLine("WebSocket conectat.");

        ws.send(JSON.stringify({
          type: "join",
          username
        }));
      });

      ws.addEventListener("close", () => {
        setStatus("Conexiune inchisa");
        shareButton.disabled = true;
        logLine("WebSocket inchis.");
      });

      ws.addEventListener("error", () => {
        setStatus("Eroare WebSocket");
        logLine("A aparut o eroare WebSocket.");
      });

      ws.onmessage = async (event) => {
        try {
          const data = JSON.parse(event.data);
          logLine(`Mesaj primit: ${data.type}`);

          if (data.error) {
            setStatus(data.error);
            return;
          }

          if (data.type === "offer" && username !== "Ion") {
            targetUser = data.from;
            targetUserInput.value = targetUser;
            pc = createPeerConnection();

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            ws.send(JSON.stringify({
              type: "answer",
              to: data.from,
              answer
            }));

            setStatus(`Answer trimis catre ${data.from}`);
            return;
          }

          if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            setStatus(`Answer primit de la ${data.from}`);
            return;
          }

          if (data.type === "ice" && data.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
          }
        } catch (error) {
          logLine(`Eroare mesaj WebSocket: ${error.message}`);
        }
      };
    }

    async function shareScreen() {
      if (username !== "Ion") {
        setStatus("Doar Ion poate face share screen.");
        return;
      }

      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus("Conecteaza-te mai intai.");
        return;
      }

      try {
        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: true
        });

        screenVideo.srcObject = localStream;

        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        console.log(JSON.stringify(offer));
        logLine("Offer generat si trimis.");

        ws.send(JSON.stringify({
          type: "offer",
          to: targetUser,
          offer
        }));

        setStatus(`Share pornit pentru ${targetUser}`);
      } catch (error) {
        logLine(`Screen share esuat: ${error.message}`);
        setStatus("Nu s-a putut porni share screen.");
      }
    }

    function createPeerConnection() {
      const peerConnection = new RTCPeerConnection();

      peerConnection.ontrack = (event) => {
        if (username !== "Ion") {
          screenVideo.srcObject = event.streams[0];
          setStatus(`Stream primit de la ${targetUser}`);
          logLine("Stream remote atasat in video.");
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (!event.candidate || !ws || ws.readyState !== WebSocket.OPEN || !targetUser) {
          return;
        }

        ws.send(JSON.stringify({
          type: "ice",
          to: targetUser,
          candidate: event.candidate
        }));
      };

      return peerConnection;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function logLine(message) {
      const time = new Date().toLocaleTimeString();
      logs.textContent = `[${time}] ${message}\n` + logs.textContent;
    }
  </script>
</body>
</html>
