<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenApp</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --text: #1f1a14;
      --muted: #6d6257;
      --line: #d8cfc3;
      --accent: #c96c3a;
      --accent-dark: #9f4b1f;
      --success: #2f855a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #f8d8bf 0, transparent 28%),
        linear-gradient(135deg, #efe3d3, var(--bg));
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
    }

    .layout {
      display: grid;
      gap: 20px;
      grid-template-columns: 320px 1fr;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(60, 38, 18, 0.08);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      background: #fff;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 13px 16px;
      font: inherit;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    }

    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary {
      margin-top: 10px;
      color: var(--text);
      background: #efe3d3;
    }

    .status {
      margin: 14px 0 0;
      color: var(--success);
      min-height: 22px;
      font-size: 14px;
    }

    .videoWrap {
      overflow: hidden;
      min-height: 420px;
    }

    video {
      display: block;
      width: 100%;
      min-height: 420px;
      background: #111;
      border-radius: 14px;
    }

    .logs {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #f7f1e8;
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      min-height: 120px;
    }

    .hint {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      video {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>ScreenApp</h1>
    <p class="subtitle">Intri intr-o camera, vezi cine este online si alegi cui trimiti ecranul.</p>

    <section class="layout">
      <div class="panel">
        <label for="username">Username</label>
        <input id="username" value="" placeholder="ex: ioana" />

        <label for="roomId">Camera</label>
        <input id="roomId" value="sedinta-1" />

        <button id="connectButton">Connect</button>
        <button id="shareButton" class="secondary" disabled>Share Screen</button>
        <button id="requestControlButton" class="secondary" disabled>Request Control</button>

        <p id="status" class="status">Neconectat</p>
        <p class="hint">Selecteaza un participant online din lista si apoi apasa `Share Screen`.</p>
        <div id="participants" class="logs">Participanti online</div>
      </div>

      <div class="panel videoWrap">
        <video id="screenVideo" autoplay playsinline muted></video>
        <div id="logs" class="logs">Jurnal aplicatie</div>
      </div>
    </section>
  </main>

  <script>
    const usernameInput = document.getElementById("username");
    const roomIdInput = document.getElementById("roomId");
    const connectButton = document.getElementById("connectButton");
    const shareButton = document.getElementById("shareButton");
    const requestControlButton = document.getElementById("requestControlButton");
    const statusText = document.getElementById("status");
    const screenVideo = document.getElementById("screenVideo");
    const logs = document.getElementById("logs");
    const participantsBox = document.getElementById("participants");

    let ws = null;
    let pc = null;
    let localStream = null;
    let username = "";
    let roomId = "";
    let targetUser = "";
    let participants = [];
    let controlTargetUser = "";
    let acceptedControllerUser = "";
    let hasControlPermission = false;
    let remoteStreamActive = false;
    let lastMouseSentAt = 0;

    connectButton.addEventListener("click", connect);
    shareButton.addEventListener("click", shareScreen);
    requestControlButton.addEventListener("click", requestControl);
    screenVideo.addEventListener("mousemove", forwardMouseEvent);
    screenVideo.addEventListener("mousedown", forwardMouseEvent);
    screenVideo.addEventListener("click", forwardMouseEvent);
    window.addEventListener("keydown", forwardKeyboardEvent);
    window.addEventListener("keyup", forwardKeyboardEvent);

    function connect() {
      username = usernameInput.value.trim();
      roomId = roomIdInput.value.trim() || "main";

      if (!username) {
        setStatus("Completeaza username.");
        return;
      }

      if (ws && ws.readyState === WebSocket.OPEN) {
        logLine("WebSocket deja conectat.");
        return;
      }

      const protocol = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${protocol}://${location.host}`);
      pc = createPeerConnection();

      ws.addEventListener("open", () => {
        setStatus(`Conectat ca ${username}`);
        shareButton.disabled = true;
        requestControlButton.disabled = true;
        logLine("WebSocket conectat.");

        ws.send(JSON.stringify({
          type: "join",
          username,
          roomId
        }));
      });

      ws.addEventListener("close", () => {
        setStatus("Conexiune inchisa");
        shareButton.disabled = true;
        requestControlButton.disabled = true;
        logLine("WebSocket inchis.");
      });

      ws.addEventListener("error", () => {
        setStatus("Eroare WebSocket");
        logLine("A aparut o eroare WebSocket.");
      });

      ws.onmessage = async (event) => {
        try {
          const data = JSON.parse(event.data);
          logLine(`Mesaj primit: ${data.type}`);

          if (data.error) {
            setStatus(data.error);
            return;
          }

          if (data.type === "participants") {
            participants = data.participants.filter((name) => name !== username);
            renderParticipants();
            return;
          }

          if (data.type === "offer") {
            targetUser = data.from;
            pc = createPeerConnection();

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            ws.send(JSON.stringify({
              type: "answer",
              to: data.from,
              answer
            }));

            setStatus(`Answer trimis catre ${data.from}`);
            return;
          }

          if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            setStatus(`Answer primit de la ${data.from}`);
            return;
          }

          if (data.type === "ice" && data.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            return;
          }

          if (data.type === "control-request") {
            const accepted = confirm(`${data.from} cere control remote. Permiti controlul?`);
            acceptedControllerUser = accepted ? data.from : "";
            ws.send(JSON.stringify({
              type: accepted ? "control-granted" : "control-revoked",
              to: data.from
            }));
            setStatus(
              accepted
                ? `Control acordat catre ${data.from}`
                : `Control refuzat pentru ${data.from}`
            );
            return;
          }

          if (data.type === "control-granted") {
            hasControlPermission = true;
            controlTargetUser = data.from;
            setStatus(`Control activ pentru ${data.from}`);
            logLine("Control remote aprobat.");
            return;
          }

          if (data.type === "control-revoked") {
            hasControlPermission = false;
            controlTargetUser = "";
            acceptedControllerUser = "";
            setStatus(`Control oprit de ${data.from}`);
            logLine("Control remote oprit sau refuzat.");
            return;
          }

          if (data.type === "remote-mouse") {
            if (data.from === acceptedControllerUser && window.screenAppDesktop?.isElectronDesktop) {
              await window.screenAppDesktop.executeRemoteMouse(data);
            }
            return;
          }

          if (data.type === "remote-keyboard") {
            if (data.from === acceptedControllerUser && window.screenAppDesktop?.isElectronDesktop) {
              await window.screenAppDesktop.executeRemoteKeyboard(data);
            }
          }
        } catch (error) {
          logLine(`Eroare mesaj WebSocket: ${error.message}`);
        }
      };
    }

    async function shareScreen() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus("Conecteaza-te mai intai.");
        return;
      }

      if (!targetUser) {
        setStatus("Alege mai intai un participant din camera.");
        return;
      }

      try {
        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: true
        });

        screenVideo.srcObject = localStream;

        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        console.log(JSON.stringify(offer));
        logLine("Offer generat si trimis.");

        ws.send(JSON.stringify({
          type: "offer",
          to: targetUser,
          offer
        }));

        setStatus(`Share pornit pentru ${targetUser}`);
        requestControlButton.disabled = true;
      } catch (error) {
        logLine(`Screen share esuat: ${error.message}`);
        setStatus("Nu s-a putut porni share screen.");
      }
    }

    function requestControl() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus("Conecteaza-te mai intai.");
        return;
      }

      if (!targetUser) {
        setStatus("Alege participantul pe care vrei sa il controlezi.");
        return;
      }

      ws.send(JSON.stringify({
        type: "control-request",
        to: targetUser
      }));

      setStatus(`Cerere de control trimisa catre ${targetUser}`);
      logLine("Cerere de control trimisa.");
    }

    function createPeerConnection() {
      const peerConnection = new RTCPeerConnection();

      peerConnection.ontrack = (event) => {
        screenVideo.srcObject = event.streams[0];
        setStatus(`Stream primit de la ${targetUser}`);
        logLine("Stream remote atasat in video.");
        remoteStreamActive = true;
        requestControlButton.disabled = false;
      };

      peerConnection.onicecandidate = (event) => {
        if (!event.candidate || !ws || ws.readyState !== WebSocket.OPEN || !targetUser) {
          return;
        }

        ws.send(JSON.stringify({
          type: "ice",
          to: targetUser,
          candidate: event.candidate
        }));
      };

      return peerConnection;
    }

    function renderParticipants() {
      if (participants.length === 0) {
        participantsBox.textContent = "Nu exista alti participanti online in aceasta camera.";
        shareButton.disabled = true;
        requestControlButton.disabled = true;
        return;
      }

      participantsBox.innerHTML = "";

      participants.forEach((name) => {
        const button = document.createElement("button");
        button.textContent = name === targetUser ? `${name} (selectat)` : name;
        button.className = "secondary";
        button.style.marginTop = "8px";
        button.disabled = false;
        button.addEventListener("click", () => {
          targetUser = name;
          hasControlPermission = false;
          controlTargetUser = "";
          shareButton.disabled = false;
          requestControlButton.disabled = !remoteStreamActive;
          setStatus(`Participant selectat: ${name}`);
          renderParticipants();
        });
        participantsBox.appendChild(button);
      });
    }

    function forwardMouseEvent(event) {
      if (!hasControlPermission || !controlTargetUser || !remoteStreamActive) {
        return;
      }

      if (event.type === "mousemove" && Date.now() - lastMouseSentAt < 30) {
        return;
      }

      lastMouseSentAt = Date.now();

      const rect = screenVideo.getBoundingClientRect();
      const payload = {
        type: "remote-mouse",
        to: controlTargetUser,
        eventType: event.type,
        x: Math.round(event.clientX - rect.left),
        y: Math.round(event.clientY - rect.top),
        width: Math.round(rect.width),
        height: Math.round(rect.height),
        button: typeof event.button === "number" ? event.button : 0
      };

      ws.send(JSON.stringify(payload));
    }

    function forwardKeyboardEvent(event) {
      if (!hasControlPermission || !controlTargetUser || !remoteStreamActive) {
        return;
      }

      if (document.activeElement && ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
        return;
      }

      ws.send(JSON.stringify({
        type: "remote-keyboard",
        to: controlTargetUser,
        eventType: event.type,
        key: event.key,
        code: event.code,
        altKey: event.altKey,
        ctrlKey: event.ctrlKey,
        shiftKey: event.shiftKey,
        metaKey: event.metaKey
      }));

      event.preventDefault();
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function logLine(message) {
      const time = new Date().toLocaleTimeString();
      logs.textContent = `[${time}] ${message}\n` + logs.textContent;
    }
  </script>
</body>
</html>
